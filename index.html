<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DIGIY AUDIO - Écoute et traduis tes articles. L'Afrique enracinée, connectée au monde">
  <meta name="theme-color" content="#4f46e5">
  
  <title>DIGIY AUDIO - Écoute intelligente d'articles</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🦅</text></svg>">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- App Root -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .floating-back {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      left: calc(env(safe-area-inset-left, 0px) + 14px);
      z-index: 99999;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: linear-gradient(135deg, #facc15 0%, #10b981 100%);
      color: #0f172a;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      box-shadow: 0 16px 40px rgba(0,0,0,.28);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .floating-back:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 46px rgba(0,0,0,.34);
    }

    .floating-back:active {
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .floating-back {
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        left: calc(env(safe-area-inset-left, 0px) + 10px);
        padding: 11px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <a class="floating-back" href="https://digiylyfe.com/" aria-label="Retour au site DIGIYLYFE">
    ↩️ Retour site
  </a>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
