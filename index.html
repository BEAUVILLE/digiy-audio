<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta
    name="description"
    content="DIGIY AUDIO — Écoute, traduis et retrouve tes textes, articles et notes à l’oreille."
  />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DIGIY AUDIO" />

  <title>DIGIY AUDIO — Écoute intelligente de textes</title>

  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🦅</text></svg>"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --bg:#07111f;
      --bg-soft:#0f172a;
      --text:#e5eefb;
      --muted:#9fb0c8;
      --gold:#facc15;
      --green:#10b981;
      --violet:#4f46e5;
      --line:rgba(255,255,255,.12);
      --shadow:0 18px 48px rgba(0,0,0,.28);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-right:env(safe-area-inset-right, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      --safe-left:env(safe-area-inset-left, 0px);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      min-height:100%;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(79,70,229,.18), transparent 28%),
        radial-gradient(circle at left center, rgba(16,185,129,.12), transparent 30%),
        linear-gradient(180deg, #07111f 0%, #0b1325 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      text-rendering:optimizeLegibility;
    }

    #root{
      min-height:100vh;
      position:relative;
      z-index:1;
    }

    /* ─────────────────────────────────────────────
       LOADER
    ───────────────────────────────────────────── */

    #digiy-app-loader{
      position:fixed;
      inset:0;
      z-index:9000;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        calc(var(--safe-top) + 24px)
        calc(var(--safe-right) + 20px)
        calc(var(--safe-bottom) + 24px)
        calc(var(--safe-left) + 20px);
      background:
        radial-gradient(circle at top right, rgba(79,70,229,.16), transparent 30%),
        radial-gradient(circle at bottom left, rgba(16,185,129,.12), transparent 28%),
        linear-gradient(180deg, rgba(7,17,31,.98) 0%, rgba(11,19,37,.985) 100%);
      opacity:1;
      visibility:visible;
      transition:opacity .35s ease, visibility .35s ease;
    }

    #digiy-app-loader.is-hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    body[data-app-ready="true"] #digiy-app-loader{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .digiy-loader-card{
      width:min(100%, 420px);
      border:1px solid var(--line);
      border-radius:26px;
      padding:26px 22px;
      background:rgba(10,19,35,.74);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .digiy-loader-eagle{
      font-size:40px;
      line-height:1;
      margin-bottom:14px;
      display:block;
    }

    .digiy-loader-title{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.02em;
      color:#fff;
      margin-bottom:8px;
    }

    .digiy-loader-text{
      font-size:14px;
      line-height:1.55;
      color:var(--muted);
      margin-bottom:18px;
    }

    .digiy-loader-bar{
      width:100%;
      height:10px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.06);
    }

    .digiy-loader-bar > span{
      display:block;
      width:42%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--gold) 0%, var(--green) 55%, var(--violet) 100%);
      animation:digiyLoaderMove 1.15s ease-in-out infinite;
      transform-origin:left center;
    }

    .digiy-loader-note{
      margin-top:12px;
      font-size:12px;
      color:rgba(229,238,251,.68);
      letter-spacing:.02em;
    }

    @keyframes digiyLoaderMove{
      0%{ transform:translateX(-80%) scaleX(.8); }
      50%{ transform:translateX(90%) scaleX(1.05); }
      100%{ transform:translateX(230%) scaleX(.85); }
    }


    /* ─────────────────────────────────────────────
       SECOURS ANTI-ÉCRAN NOIR
       N'apparaît que si React ne monte pas.
    ───────────────────────────────────────────── */

    .digiy-react-rescue{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        calc(var(--safe-top) + 92px)
        calc(var(--safe-right) + 20px)
        calc(var(--safe-bottom) + 96px)
        calc(var(--safe-left) + 20px);
    }

    .digiy-react-rescue-card{
      width:min(100%,720px);
      border:1px solid rgba(255,255,255,.14);
      border-radius:30px;
      padding:26px 22px;
      background:
        radial-gradient(circle at top right, rgba(250,204,21,.14), transparent 36%),
        radial-gradient(circle at bottom left, rgba(16,185,129,.14), transparent 40%),
        rgba(10,19,35,.84);
      box-shadow:var(--shadow);
      text-align:center;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    .digiy-react-rescue-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:40px;
      padding:9px 13px;
      border-radius:999px;
      border:1px solid rgba(250,204,21,.35);
      background:rgba(250,204,21,.10);
      color:#fef3c7;
      font-weight:900;
      font-size:13px;
      margin-bottom:14px;
    }

    .digiy-react-rescue h1{
      margin:0;
      color:#fff;
      font-size:clamp(28px,6vw,52px);
      line-height:1;
      letter-spacing:-.045em;
      font-weight:900;
    }

    .digiy-react-rescue p{
      max-width:62ch;
      margin:14px auto 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
      font-weight:700;
    }

    .digiy-react-rescue-actions{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .digiy-react-rescue-actions a,
    .digiy-react-rescue-actions button{
      min-height:46px;
      border:none;
      border-radius:999px;
      padding:12px 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:linear-gradient(135deg,#facc15,#10b981);
      color:#0f172a;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      font-family:'Inter', system-ui, sans-serif;
    }

    .digiy-react-rescue-actions .soft{
      background:rgba(255,255,255,.08);
      color:#e5eefb;
      border:1px solid rgba(255,255,255,.14);
    }

    /* ─────────────────────────────────────────────
       PORTES DIGIY : SITE / HUB / TARIFS
       Placées en dernier dans le body avec z-index fort.
    ───────────────────────────────────────────── */

    #digiy-floating-links{
      position:fixed !important;
      top:calc(var(--safe-top) + 12px) !important;
      left:calc(var(--safe-left) + 12px) !important;
      right:calc(var(--safe-right) + 12px) !important;
      z-index:2147483647 !important;
      display:flex !important;
      align-items:center !important;
      justify-content:space-between !important;
      gap:10px !important;
      pointer-events:none !important;
    }

    .digiy-floating-left,
    .digiy-floating-right{
      display:flex !important;
      align-items:center !important;
      gap:8px !important;
      pointer-events:auto !important;
    }

    .digiy-floating-btn{
      display:inline-flex !important;
      align-items:center !important;
      justify-content:center !important;
      gap:8px !important;
      min-height:46px !important;
      padding:12px 16px !important;
      border-radius:999px !important;
      border:1px solid rgba(255,255,255,.2) !important;
      background:rgba(15,23,42,.78) !important;
      color:#e5eefb !important;
      text-decoration:none !important;
      font-family:'Inter', system-ui, sans-serif !important;
      font-size:14px !important;
      font-weight:900 !important;
      line-height:1 !important;
      box-shadow:0 16px 42px rgba(0,0,0,.28) !important;
      white-space:nowrap !important;
      cursor:pointer !important;
      backdrop-filter:blur(14px) !important;
      -webkit-backdrop-filter:blur(14px) !important;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease !important;
    }

    .digiy-floating-btn:hover{
      transform:translateY(-1px) !important;
      box-shadow:0 20px 44px rgba(0,0,0,.32) !important;
      background:rgba(15,23,42,.92) !important;
    }

    .digiy-floating-btn:active{
      transform:translateY(0) scale(.985) !important;
    }

    .digiy-floating-btn.main{
      background:linear-gradient(135deg, #facc15 0%, #10b981 100%) !important;
      color:#0f172a !important;
    }

    @media (max-width:760px){
      #digiy-floating-links{
        top:calc(var(--safe-top) + 10px) !important;
        left:calc(var(--safe-left) + 10px) !important;
        right:calc(var(--safe-right) + 10px) !important;
        align-items:flex-start !important;
      }

      .digiy-floating-left,
      .digiy-floating-right{
        gap:6px !important;
      }

      .digiy-floating-btn{
        min-height:42px !important;
        padding:10px 12px !important;
        font-size:13px !important;
      }

      .digiy-floating-btn .txt{
        display:none !important;
      }
    }

    @media (max-width:430px){
      #digiy-floating-links{
        flex-direction:column !important;
        align-items:flex-start !important;
      }

      .digiy-floating-right{
        width:100% !important;
        justify-content:flex-start !important;
        flex-wrap:wrap !important;
      }
    }

    @media (prefers-reduced-motion: reduce){
      html{
        scroll-behavior:auto;
      }

      .digiy-loader-bar > span{
        animation:none;
        width:70%;
        transform:none;
      }

      .digiy-floating-btn{
        transition:none !important;
      }
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="digiy-app-loader" aria-live="polite" aria-label="Chargement de DIGIY AUDIO">
    <div class="digiy-loader-card">
      <span class="digiy-loader-eagle" aria-hidden="true">🦅</span>
      <div class="digiy-loader-title">DIGIY AUDIO</div>
      <p class="digiy-loader-text">
        Préparation de l'écoute intelligente. On pose le terrain proprement.
      </p>
      <div class="digiy-loader-bar" aria-hidden="true"><span></span></div>
      <div class="digiy-loader-note">Chargement sécurisé de l'interface</div>
    </div>
  </div>

  <!-- APP REACT -->
  <div id="root"></div>

  <!-- SCRIPT REACT -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- LOADER AUTO-HIDE + SECOURS ANTI-ÉCRAN NOIR -->
  <script>
    (function () {
      var loader = document.getElementById('digiy-app-loader');
      var root = document.getElementById('root');

      function hide() {
        document.body.setAttribute('data-app-ready', 'true');
        if (loader) loader.classList.add('is-hidden');
      }

      function showRescueIfNeeded() {
        if (!root) return;

        var hasReactContent = root.children && root.children.length > 0;
        if (hasReactContent) {
          hide();
          return;
        }

        root.innerHTML = ''
          + '<section class="digiy-react-rescue" aria-label="DIGIY AUDIO secours">'
          + '  <div class="digiy-react-rescue-card">'
          + '    <div class="digiy-react-rescue-badge">🎧 DIGIY AUDIO</div>'
          + '    <h1>Le logiciel ne s’est pas chargé.</h1>'
          + '    <p>Ce n’est pas ton texte qui bloque : c’est le moteur React de la page. Vérifie que le fichier <strong>/src/main.jsx</strong> existe bien sur le domaine, ou que la version construite de l’application est bien publiée.</p>'
          + '    <p>DIGIY AUDIO sert à ranger des textes, articles et notes pour les retrouver ensuite en écoute.</p>'
          + '    <div class="digiy-react-rescue-actions">'
          + '      <button type="button" onclick="location.reload()">🔄 Recharger</button>'
          + '      <a class="soft" href="https://digiylyfe.com/">🌍 Site</a>'
          + '      <a class="soft" href="https://pro-espace.digiylyfe.com/">🧭 HUB</a>'
          + '      <a class="soft" href="https://tarifs.digiylyfe.com/">📦 Tarifs</a>'
          + '    </div>'
          + '  </div>'
          + '</section>';

        hide();
      }

      if (root) {
        var obs = new MutationObserver(function () {
          if (root.children.length > 0) {
            hide();
            obs.disconnect();
          }
        });

        obs.observe(root, { childList: true });
      }

      window.addEventListener('load', function () {
        setTimeout(function () {
          if (root && root.children.length > 0) {
            hide();
          }
        }, 700);
      }, { once: true });

      setTimeout(showRescueIfNeeded, 3600);
    })();
  </script>

  <!--
    PORTES DIGIY — TOUJOURS EN DERNIER DANS LE BODY
    Site / HUB / Tarifs restent accessibles même si React charge lentement.
  -->
  <nav id="digiy-floating-links" aria-label="Navigation DIGIYLYFE">
    <div class="digiy-floating-left">
      <a
        class="digiy-floating-btn main"
        href="https://digiylyfe.com/"
        aria-label="Retour au site DIGIYLYFE"
      >
        <span aria-hidden="true">↩️</span>
        <span class="txt">Site</span>
      </a>
    </div>

    <div class="digiy-floating-right">
      <a
        class="digiy-floating-btn"
        href="https://pro-espace.digiylyfe.com/"
        aria-label="Ouvrir le HUB DIGIY"
      >
        <span aria-hidden="true">🧭</span>
        <span class="txt">HUB</span>
      </a>

      <a
        class="digiy-floating-btn"
        href="https://tarifs.digiylyfe.com/"
        aria-label="Voir les tarifs DIGIYLYFE"
      >
        <span aria-hidden="true">📦</span>
        <span class="txt">Tarifs</span>
      </a>
    </div>
  </nav>

</body>
</html>
